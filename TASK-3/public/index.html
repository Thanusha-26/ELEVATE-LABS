<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book API Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
            font-weight: 300;
        }

        main {
            padding: 40px 20px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .section {
            padding: 30px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 0.95em;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .books-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            grid-column: 1 / -1;
        }

        .book-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: box-shadow 0.3s, transform 0.3s;
            gap: 15px;
            flex-wrap: wrap;
        }

        .book-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .book-info {
            flex: 1;
            min-width: 200px;
        }

        .book-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .book-author {
            color: #666;
            font-size: 1em;
        }

        .book-id {
            color: #999;
            font-size: 0.85em;
            margin-top: 8px;
        }

        .book-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-edit, .btn-delete {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-edit {
            background: #4CAF50;
            color: white;
        }

        .btn-edit:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .status-message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .modal h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.95em;
            border-top: 1px solid #e0e0e0;
        }

        footer a {
            color: #667eea;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Book API Manager</h1>
            <p>A simple REST API for managing your book collection</p>
        </header>

        <main>
            <div class="content-grid">
                <!-- Add Book Section -->
                <div class="section">
                    <h2>➕ Add New Book</h2>
                    <div id="addStatus" class="status-message"></div>
                    <form id="addBookForm">
                        <div class="form-group">
                            <label for="newTitle">Book Title</label>
                            <input type="text" id="newTitle" placeholder="e.g., The Hobbit" required>
                        </div>
                        <div class="form-group">
                            <label for="newAuthor">Author Name</label>
                            <input type="text" id="newAuthor" placeholder="e.g., J.R.R. Tolkien" required>
                        </div>
                        <button type="submit">Add Book</button>
                    </form>
                </div>

                <!-- Update Book Section -->
                <div class="section">
                    <h2>✏️ Update Book</h2>
                    <div id="updateStatus" class="status-message"></div>
                    <form id="updateBookForm">
                        <div class="form-group">
                            <label for="updateId">Book ID</label>
                            <input type="number" id="updateId" placeholder="Enter book ID" required>
                        </div>
                        <div class="form-group">
                            <label for="updateTitle">New Title</label>
                            <input type="text" id="updateTitle" placeholder="Enter new title" required>
                        </div>
                        <div class="form-group">
                            <label for="updateAuthor">New Author</label>
                            <input type="text" id="updateAuthor" placeholder="Enter new author" required>
                        </div>
                        <button type="submit">Update Book</button>
                    </form>
                </div>
            </div>

            <!-- Books List Section -->
            <div class="section">
                <h2>📖 All Books</h2>
                <div id="loadingIndicator" class="loading">
                    <div class="spinner"></div>
                    <p>Loading books...</p>
                </div>
                <div id="booksList" class="books-list"></div>
            </div>
        </main>

        <footer>
            <p>🚀 Built with Node.js, Express.js & Vanilla JavaScript | <a href="https://github.com" target="_blank">View on GitHub</a></p>
        </footer>
    </div>

    <script>
        const API_URL = '/api/books';

        // Show loading indicator
        function showLoading() {
            document.getElementById('loadingIndicator').style.display = 'block';
        }

        // Hide loading indicator
        function hideLoading() {
            document.getElementById('loadingIndicator').style.display = 'none';
        }

        // Show status message
        function showStatus(elementId, message, type) {
            const statusEl = document.getElementById(elementId);
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            setTimeout(() => {
                statusEl.className = 'status-message';
            }, 4000);
        }

        // Fetch and display all books
        async function loadBooks() {
            showLoading();
            try {
                const response = await fetch(API_URL);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message);
                }

                displayBooks(result.data);
            } catch (error) {
                console.error('Error loading books:', error);
                document.getElementById('booksList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Failed to load books. Please try again.</p>
                    </div>
                `;
            } finally {
                hideLoading();
            }
        }

        // Display books on the page
        function displayBooks(books) {
            const booksList = document.getElementById('booksList');

            if (books.length === 0) {
                booksList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <p>No books found. Add your first book!</p>
                    </div>
                `;
                return;
            }

            booksList.innerHTML = books.map(book => `
                <div class="book-card">
                    <div class="book-info">
                        <div class="book-title">${escapeHtml(book.title)}</div>
                        <div class="book-author">by ${escapeHtml(book.author)}</div>
                        <div class="book-id">ID: ${book.id}</div>
                    </div>
                    <div class="book-actions">
                        <button class="btn-edit" onclick="prepareEdit(${book.id})">Edit</button>
                        <button class="btn-delete" onclick="deleteBook(${book.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Prepare edit form
        function prepareEdit(id) {
            document.getElementById('updateId').value = id;
            document.getElementById('updateTitle').focus();
        }

        // Add new book
        document.getElementById('addBookForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('newTitle').value.trim();
            const author = document.getElementById('newAuthor').value.trim();

            if (!title || !author) {
                showStatus('addStatus', '❌ Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, author })
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message);
                }

                showStatus('addStatus', '✅ Book added successfully!', 'success');
                document.getElementById('addBookForm').reset();
                loadBooks();
            } catch (error) {
                showStatus('addStatus', `❌ Error: ${error.message}`, 'error');
            }
        });

        // Update book
        document.getElementById('updateBookForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('updateId').value;
            const title = document.getElementById('updateTitle').value.trim();
            const author = document.getElementById('updateAuthor').value.trim();

            if (!id || !title || !author) {
                showStatus('updateStatus', '❌ Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, author })
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message);
                }

                showStatus('updateStatus', '✅ Book updated successfully!', 'success');
                document.getElementById('updateBookForm').reset();
                loadBooks();
            } catch (error) {
                showStatus('updateStatus', `❌ Error: ${error.message}`, 'error');
            }
        });

        // Delete book
        async function deleteBook(id) {
            if (!confirm('Are you sure you want to delete this book?')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message);
                }

                alert('✅ Book deleted successfully!');
                loadBooks();
            } catch (error) {
                alert(`❌ Error: ${error.message}`);
            }
        }

        // Load books on page load
        document.addEventListener('DOMContentLoaded', loadBooks);
    </script>
</body>
</html>
